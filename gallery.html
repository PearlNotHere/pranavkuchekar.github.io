<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Pranav Kuchekar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #2a2a2a;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ============================================
           PDF TOOLBAR
           ============================================ */
        .toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            height: 48px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .toolbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toolbar-back {
            color: #ccc;
            text-decoration: none;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 14px;
            border-radius: 4px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-back:hover { background: #333; color: #fff; }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: #333;
        }

        .toolbar-title {
            font-size: 0.75rem;
            color: #999;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .toolbar-title strong {
            color: #ddd;
            font-weight: 600;
        }

        /* Page counter */
        .toolbar-center {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-input {
            background: #111;
            border: 1px solid #444;
            border-radius: 3px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            width: 42px;
            text-align: center;
            padding: 4px 0;
            outline: none;
            transition: border-color 0.2s;
        }

        .page-input:focus { border-color: #888; }

        .page-total {
            font-size: 0.75rem;
            color: #888;
            font-weight: 400;
        }

        /* Toolbar buttons */
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tb-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            width: 34px;
            height: 34px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 0.85rem;
            font-family: 'Montserrat', sans-serif;
        }

        .tb-btn:hover { background: #333; color: #fff; }
        .tb-btn.active { background: #444; color: #fff; }

        .zoom-display {
            font-size: 0.7rem;
            color: #888;
            min-width: 40px;
            text-align: center;
            font-weight: 500;
        }

        /* ============================================
           SIDEBAR (Page thumbnails)
           ============================================ */
        .sidebar {
            position: fixed;
            top: 48px;
            left: 0;
            bottom: 0;
            width: 160px;
            background: #1e1e1e;
            border-right: 1px solid #333;
            overflow-y: auto;
            z-index: 100;
            padding: 12px 0;
            transition: transform 0.3s ease;
            scrollbar-width: thin;
            scrollbar-color: #444 transparent;
        }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        .sidebar.hidden { transform: translateX(-160px); }

        .thumb-item {
            padding: 6px 12px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .thumb-item:hover { background: rgba(255,255,255,0.04); }
        .thumb-item.active { background: rgba(255,255,255,0.08); }

        .thumb-item img {
            width: 100%;
            border-radius: 2px;
            border: 2px solid transparent;
            transition: border-color 0.2s;
            display: block;
        }

        .thumb-item.active img { border-color: rgba(255,255,255,0.4); }

        .thumb-num {
            font-size: 0.55rem;
            color: #666;
            font-weight: 500;
        }

        .thumb-item.active .thumb-num { color: #ccc; }

        /* ============================================
           DOCUMENT AREA
           ============================================ */
        .doc-area {
            margin-left: 160px;
            padding: 24px 0 60px;
            min-height: calc(100vh - 48px);
            margin-top: 48px;
            transition: margin-left 0.3s ease;
            background: #2a2a2a;
        }

        .doc-area.expanded { margin-left: 0; }

        .page-wrapper {
            max-width: 850px;
            margin: 0 auto 16px;
            padding: 0 24px;
        }

        .page-container {
            background: #fff;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,0,0,0.15);
            position: relative;
            overflow: hidden;
        }

        .page-container img {
            width: 100%;
            display: block;
        }

        /* Scroll-reveal */
        .page-wrapper {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .page-wrapper.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ============================================
           KEYBOARD SHORTCUTS TOOLTIP
           ============================================ */
        .shortcuts-tip {
            position: fixed;
            bottom: 16px;
            right: 16px;
            z-index: 100;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 14px 18px;
            color: #aaa;
            font-size: 0.65rem;
            line-height: 1.8;
            opacity: 0;
            visibility: hidden;
            transform: translateY(8px);
            transition: all 0.25s ease;
        }

        .shortcuts-tip.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .shortcuts-tip kbd {
            background: #333;
            border: 1px solid #555;
            border-radius: 3px;
            padding: 1px 6px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.6rem;
            color: #ddd;
            margin-right: 6px;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 900px) {
            .sidebar { width: 120px; }
            .doc-area { margin-left: 120px; }
            .sidebar.hidden + .doc-area,
            .doc-area.expanded { margin-left: 0; }
        }

        @media (max-width: 640px) {
            .sidebar { display: none; }
            .doc-area { margin-left: 0; }
            .toolbar-title { display: none; }
            .page-wrapper { padding: 0 8px; margin-bottom: 10px; }
            .shortcuts-tip { display: none; }
            .toolbar { padding: 0 8px; }
        }
    </style>
</head>
<body>

    <!-- ========== TOOLBAR ========== -->
    <div class="toolbar">
        <div class="toolbar-left">
            <a href="index.html" class="toolbar-back">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
                Home
            </a>
            <div class="toolbar-divider"></div>
            <span class="toolbar-title"><strong>Pranav Kuchekar</strong> — Portfolio</span>
        </div>

        <div class="toolbar-center">
            <input type="text" class="page-input" id="pageInput" value="1" aria-label="Current page">
            <span class="page-total">/ 30</span>
        </div>

        <div class="toolbar-right">
            <button class="tb-btn" id="sidebarToggle" title="Toggle sidebar" aria-label="Toggle sidebar">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
            </button>
            <div class="toolbar-divider"></div>
            <button class="tb-btn" id="zoomOut" title="Zoom out" aria-label="Zoom out">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <span class="zoom-display" id="zoomDisplay">100%</span>
            <button class="tb-btn" id="zoomIn" title="Zoom in" aria-label="Zoom in">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <div class="toolbar-divider"></div>
            <button class="tb-btn" id="shortcutsBtn" title="Keyboard shortcuts" aria-label="Keyboard shortcuts">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="8"/></svg>
            </button>
        </div>
    </div>

    <!-- ========== SIDEBAR ========== -->
    <div class="sidebar" id="sidebar"></div>

    <!-- ========== DOCUMENT AREA ========== -->
    <div class="doc-area" id="docArea"></div>

    <!-- ========== SHORTCUTS ========== -->
    <div class="shortcuts-tip" id="shortcutsTip">
        <kbd>↑</kbd><kbd>↓</kbd> Scroll<br>
        <kbd>+</kbd><kbd>−</kbd> Zoom<br>
        <kbd>S</kbd> Toggle sidebar
    </div>

    <script>
        const TOTAL = 30;
        const sidebar = document.getElementById('sidebar');
        const docArea = document.getElementById('docArea');
        const pageInput = document.getElementById('pageInput');
        const zoomDisplay = document.getElementById('zoomDisplay');
        let currentZoom = 100;
        let currentPage = 1;

        // --- Generate pages ---
        for (let i = 1; i <= TOTAL; i++) {
            const src = `portfolio/slide ${i}.jpg`;

            // Sidebar thumbnail
            const thumb = document.createElement('div');
            thumb.className = 'thumb-item' + (i === 1 ? ' active' : '');
            thumb.dataset.page = i;
            thumb.innerHTML = `<img src="${src}" alt="Page ${i}" loading="lazy"><span class="thumb-num">${i}</span>`;
            thumb.onclick = () => scrollToPage(i);
            sidebar.appendChild(thumb);

            // Main page
            const wrapper = document.createElement('div');
            wrapper.className = 'page-wrapper';
            wrapper.id = `page-${i}`;
            wrapper.dataset.page = i;
            wrapper.innerHTML = `<div class="page-container"><img src="${src}" alt="Portfolio page ${i}" loading="lazy"></div>`;
            docArea.appendChild(wrapper);
        }

        // --- Scroll to page ---
        function scrollToPage(n) {
            const el = document.getElementById(`page-${n}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // --- Page input navigation ---
        pageInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                let val = parseInt(pageInput.value);
                if (val >= 1 && val <= TOTAL) {
                    scrollToPage(val);
                } else {
                    pageInput.value = currentPage;
                }
                pageInput.blur();
            }
        });

        pageInput.addEventListener('blur', () => {
            pageInput.value = currentPage;
        });

        // --- Track current page on scroll ---
        const pageWrappers = document.querySelectorAll('.page-wrapper');
        const thumbItems = document.querySelectorAll('.thumb-item');

        const pageObserver = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const p = parseInt(entry.target.dataset.page);
                    currentPage = p;
                    pageInput.value = p;

                    thumbItems.forEach(t => t.classList.remove('active'));
                    const activeThumb = sidebar.querySelector(`[data-page="${p}"]`);
                    if (activeThumb) {
                        activeThumb.classList.add('active');
                        // Keep active thumb visible in sidebar
                        activeThumb.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                    }
                }
            });
        }, { threshold: 0.3 });

        pageWrappers.forEach(pw => pageObserver.observe(pw));

        // --- Scroll-reveal ---
        const revealObserver = new IntersectionObserver(entries => {
            entries.forEach(e => {
                if (e.isIntersecting) e.target.classList.add('visible');
            });
        }, { threshold: 0.05 });

        pageWrappers.forEach(pw => revealObserver.observe(pw));

        // --- Sidebar toggle ---
        const sidebarEl = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        let sidebarVisible = true;

        sidebarToggle.addEventListener('click', () => {
            sidebarVisible = !sidebarVisible;
            sidebarEl.classList.toggle('hidden', !sidebarVisible);
            docArea.classList.toggle('expanded', !sidebarVisible);
            sidebarToggle.classList.toggle('active', !sidebarVisible);
        });

        // --- Zoom ---
        const zoomIn = document.getElementById('zoomIn');
        const zoomOut = document.getElementById('zoomOut');

        function applyZoom() {
            const pages = document.querySelectorAll('.page-wrapper');
            const maxW = 850 * (currentZoom / 100);
            pages.forEach(p => p.style.maxWidth = maxW + 'px');
            zoomDisplay.textContent = currentZoom + '%';
        }

        zoomIn.addEventListener('click', () => {
            if (currentZoom < 200) { currentZoom += 15; applyZoom(); }
        });

        zoomOut.addEventListener('click', () => {
            if (currentZoom > 50) { currentZoom -= 15; applyZoom(); }
        });

        // --- Keyboard shortcuts ---
        const shortcutsBtn = document.getElementById('shortcutsBtn');
        const shortcutsTip = document.getElementById('shortcutsTip');

        shortcutsBtn.addEventListener('click', () => {
            shortcutsTip.classList.toggle('show');
        });

        document.addEventListener('keydown', e => {
            if (document.activeElement === pageInput) return;

            if (e.key === '+' || e.key === '=') {
                e.preventDefault();
                if (currentZoom < 200) { currentZoom += 15; applyZoom(); }
            } else if (e.key === '-') {
                e.preventDefault();
                if (currentZoom > 50) { currentZoom -= 15; applyZoom(); }
            } else if (e.key === 's' || e.key === 'S') {
                e.preventDefault();
                sidebarToggle.click();
            }
        });

        // Close shortcuts on outside click
        document.addEventListener('click', e => {
            if (!shortcutsTip.contains(e.target) && !shortcutsBtn.contains(e.target)) {
                shortcutsTip.classList.remove('show');
            }
        });
    </script>
</body>
</html>
