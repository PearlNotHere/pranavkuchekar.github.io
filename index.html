<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Pranav Kuchekar</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas#canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            pointer-events: none;
        }

        .label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: rgba(255,255,255,0.25);
            margin-bottom: 18px;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.2s forwards;
        }

        h1 {
            color: #ffffff;
            font-size: clamp(2.5rem, 7vw, 5.5rem);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
            opacity: 0;
            animation: fadeIn 2s ease-out 0.5s forwards;
            text-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        }

        .tagline {
            font-size: clamp(0.8rem, 1.5vw, 0.95rem);
            color: rgba(255,255,255,0.2);
            font-weight: 300;
            margin-top: 12px;
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeIn 2s ease-out 0.8s forwards;
        }

        .portfolio-btn {
            display: inline-block;
            margin-top: 28px;
            z-index: 100;
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 14px 30px;
            border-radius: 30px;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            animation: fadeIn 1.5s ease-out 1s forwards;
            pointer-events: all;
        }

        .portfolio-btn:hover {
            background: white;
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .contact-trigger {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 14px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-family: 'Montserrat', sans-serif;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 1.4s forwards;
        }

        .contact-trigger:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .snackbar {
            position: fixed;
            bottom: 85px;
            right: 30px;
            z-index: 100;
            background: rgba(15, 15, 15, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 28px;
            border-radius: 16px;
            color: white;
            width: 300px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            opacity: 0;
            visibility: hidden;
            transform: translateY(15px) scale(0.97);
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .snackbar.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .snackbar h3 { margin: 0 0 16px 0; font-size: 1.1rem; font-weight: 700; }

        .snackbar-line { height: 1px; background: rgba(255,255,255,0.1); margin-bottom: 16px; }

        .contact-row { display: flex; align-items: center; gap: 12px; margin: 12px 0; font-size: 0.88rem; }

        .contact-row .icon {
            width: 34px; height: 34px; border-radius: 8px;
            background: rgba(255,255,255,0.06);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.85rem; flex-shrink: 0;
        }

        .snackbar a { color: rgba(255,255,255,0.6); text-decoration: none; transition: color 0.2s; }
        .snackbar a:hover { color: #fff; }

        .close-btn {
            position: absolute; top: 14px; right: 16px; cursor: pointer;
            font-size: 1.3rem; color: rgba(255,255,255,0.25); transition: color 0.2s; line-height: 1;
        }
        .close-btn:hover { color: #fff; }

        .corner-text {
            position: fixed; bottom: 30px; left: 30px; z-index: 10;
            font-size: 0.55rem; color: rgba(255,255,255,0.1);
            letter-spacing: 3px; text-transform: uppercase;
            writing-mode: vertical-lr; transform: rotate(180deg);
            opacity: 0; animation: fadeIn 2s ease-out 1.5s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); filter: blur(6px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @media (max-width: 768px) {
            .contact-trigger { bottom: 20px; right: 20px; padding: 11px 18px; font-size: 0.7rem; }
            .snackbar { right: 20px; bottom: 70px; width: 260px; padding: 22px; }
            .portfolio-btn { padding: 12px 24px; font-size: 0.7rem; }
            .corner-text { display: none; }
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content">
        <div class="label">Multidisciplinary Designer</div>
        <h1>Pranav Kuchekar</h1>
        <div class="tagline">Website Under Development</div>
        <a href="gallery.html" class="portfolio-btn">Full Portfolio</a>
    </div>

    <div class="contact-trigger" onclick="toggleContact()">Contact</div>

    <div class="snackbar" id="contactCard">
        <span class="close-btn" onclick="toggleContact()">&times;</span>
        <h3>Pranav Kuchekar</h3>
        <div class="snackbar-line"></div>
        <div class="contact-row">
            <div class="icon">📞</div>
            <a href="tel:8308812191">8308812191</a>
        </div>
        <div class="contact-row">
            <div class="icon">✉️</div>
            <a href="mailto:pranavkuchekar2105@gmail.com">pranavkuchekar2105@gmail.com</a>
        </div>
    </div>

    <div class="corner-text">Portfolio — 2025</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: null, y: null, radius: 120 };

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.8 + 0.3;
                this.bx = (Math.random() - 0.5) * 0.4;
                this.by = (Math.random() - 0.5) * 0.4;
                this.sx = this.bx;
                this.sy = this.by;
                this.opacity = Math.random() * 0.4 + 0.15;
            }
            update() {
                if (mouse.x !== null) {
                    const dx = this.x - mouse.x, dy = this.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < mouse.radius) {
                        const force = (mouse.radius - dist) / mouse.radius;
                        this.sx = this.bx + (dx / dist) * force * 1.5;
                        this.sy = this.by + (dy / dist) * force * 1.5;
                    } else {
                        this.sx += (this.bx - this.sx) * 0.04;
                        this.sy += (this.by - this.sy) * 0.04;
                    }
                }
                this.x += this.sx; this.y += this.sy;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles() {
            particles = [];
            const n = Math.min((canvas.width * canvas.height) / 9000, 200);
            for (let i = 0; i < n; i++) particles.push(new Particle());
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const d = dx*dx + dy*dy;
                    if (d < 9000) {
                        ctx.strokeStyle = `rgba(255,255,255,${0.035 * (1 - Math.sqrt(d) / 95)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const p of particles) { p.update(); p.draw(); }
            drawLines();
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
        window.addEventListener('resize', () => { init(); createParticles(); });

        init(); createParticles(); animate();

        function toggleContact() {
            document.getElementById('contactCard').classList.toggle('active');
        }

        document.addEventListener('click', e => {
            const card = document.getElementById('contactCard');
            const trigger = document.querySelector('.contact-trigger');
            if (!card.contains(e.target) && !trigger.contains(e.target) && card.classList.contains('active')) {
                card.classList.remove('active');
            }
        });
    </script>
</body>
</html>
